<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallpaper Sync</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="dropZoneOverlay" class="drop-zone-overlay hidden">
        <div class="drop-zone-content">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" class="upload-icon">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <h2>Drop Wallpapers Here</h2>
            <p>Release to add to your collection</p>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand">
                <img src="../icon.png" alt="App Logo" class="app-logo">
                <h1>Wallpaper Sync</h1>
            </div>

            <div class="sidebar-section">
                <h3>Controls</h3>
                <button id="syncNowBtn" class="btn primary-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                    Next Wallpaper
                </button>
            </div>

            <div class="sidebar-section">
                <h3>Slideshow</h3>
                <div class="setting-row">
                    <span class="setting-label">Enable</span>
                    <label class="switch">
                        <input type="checkbox" id="slideshowToggle">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <span class="setting-label">Interval</span>
                    <div class="select-wrapper">
                        <select id="intervalDropdown">
                            <option value="10000">10 Seconds</option>
                            <option value="30000">30 Seconds</option>
                            <option value="60000">1 Minute</option>
                            <option value="300000">5 Minutes</option>
                            <option value="600000">10 Minutes</option>
                            <option value="1800000">30 Minutes</option>
                            <option value="3600000">1 Hour</option>
                            <option value="21600000">6 Hours</option>
                            <option value="86400000">1 Day</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>Network</h3>
                <div class="setting-row">
                    <span class="setting-label">Auto Sync</span>
                    <label class="switch">
                        <input type="checkbox" id="autoSyncToggle">
                        <span class="slider round"></span>
                    </label>
                </div>
                <button id="fetchWallpapersBtn" class="primary-btn" style="margin-top: 1rem; background: #8b5cf6;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Fetch from Server
                </button>
            </div>

            <div class="drag-hint">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p>Drag & Drop anywhere to add images</p>
            </div>
        </aside>

        <main class="gallery-container">
            <div class="gallery-header">
                <h2>Your Collection</h2>
            </div>
            <div class="gallery" id="gallery">
                <!-- Wallpapers will be injected here -->
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
